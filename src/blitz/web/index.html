<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>⚡ Blitzortung Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <div class="title">⚡ Blitzortung Monitor</div>
  <nav>
    <button class="tab active" data-tab="live">Live</button>
    <button class="tab" data-tab="history">Historique</button>
  </nav>
  <div class="status">
    <span id="mqtt-dot" class="dot dot-red" title="État MQTT"></span>
    <span id="mqtt-text">…</span>
    <button id="tz-toggle" class="tz-btn" title="Basculer heure locale / UTC">Local</button>
    <label class="alert-toggle">
      <input type="checkbox" id="alert-sound"> son d'alerte
    </label>
  </div>
</header>

<section id="tab-live" class="tab-panel active">
  <div id="map-live" class="map"></div>
  <aside class="sidebar">
    <h2>Statistiques</h2>
    <ul id="stats">
      <li>Position : <span id="home-pos">—</span></li>
      <li>Rayon : <span id="radius">—</span></li>
      <li>Uptime : <span id="uptime">—</span></li>
      <li>Total mondial : <span id="total-world">0</span></li>
      <li>Dans la zone : <span id="nearby">0</span></li>
      <li>Plus proche : <span id="closest">—</span></li>
      <li>Session DB : +<span id="logged-session">0</span></li>
      <li>Total DB : <span id="logged-total">0</span></li>
    </ul>
    <h2>Cellules orageuses</h2>
    <div id="cells-list"><em>aucune cellule détectée</em></div>
    <h2>Derniers impacts</h2>
    <table id="strikes-table">
      <thead><tr><th>Heure</th><th>Dist</th><th>Dir</th><th>Δsons</th><th>MDS</th></tr></thead>
      <tbody></tbody>
    </table>
  </aside>
</section>

<section id="tab-history" class="tab-panel">
  <div class="hist-controls">
    <label>De <input type="datetime-local" id="hist-from"></label>
    <label>À <input type="datetime-local" id="hist-to"></label>
    <label>Dist max (km) <input type="number" id="hist-dist" min="1" max="1000" step="5"></label>
    <label>MDS min <input type="number" id="hist-mds" min="0" max="50"></label>
    <button id="hist-load">Charger</button>
    <button id="hist-replay">Replay ×60</button>
    <span id="hist-count" class="muted"></span>
  </div>
  <div id="map-hist" class="map"></div>
  <div id="hist-chart-wrap">
    <h3>Impacts par heure</h3>
    <canvas id="hist-chart" height="120"></canvas>
  </div>
</section>

<script src="/static/app.js"></script>
</body>
</html>
